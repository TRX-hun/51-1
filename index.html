<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRX | الموقع الرسمي</title>
    <style>
        :root { --bg: #000000; --green: #2ecc71; --card: rgba(15, 15, 19, 0.9); }
        body { background-color: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0; text-align: center; }
        #star-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #000; }
        .container { max-width: 600px; margin: 20px auto; padding: 0 15px; }
        .card { background: var(--card); border-radius: 15px; padding: 12px; border: 1px solid #333; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
        .card-info { display: flex; align-items: center; gap: 12px; }
        .card-img { width: 45px; height: 45px; border-radius: 10px; object-fit: cover; }
        .install-btn { padding: 8px 15px; background: transparent; border: 1.5px solid var(--green); color: var(--green); text-decoration: none; border-radius: 10px; font-weight: bold; }
        .content-section { display: none; }
        .content-section.active { display: block; }
        .tab-btn { padding: 10px 20px; cursor: pointer; background: #222; border: none; color: white; border-radius: 10px; margin: 5px; }
        .tab-btn.active { background: #5865F2; }
    </style>
</head>
<body>

<div id="star-container"></div>
<div class="container">
    
    <div class="tab-container">
        <button class="tab-btn active" onclick="showTab('scarlet-tab')">Scarlet</button>
        <button class="tab-btn" onclick="showTab('esign-tab')">ESign</button>
    </div>

    <div id="scarlet-tab" class="content-section active">
        <div class="card">
            <div class="card-info">
                <img src="https://i.ibb.co/k6fbd95/IMG-2265.jpg" class="card-img" onerror="this.src='https://via.placeholder.com/50'">
                <span>Scarlet Airlines</span>
            </div>
            <a href="itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/davidum19/Scarlet-OTA/refs/heads/main/airlines/manifest.plist" class="install-btn">INSTALL</a>
        </div>
        <div class="card">
            <div class="card-info">
                <img src="https://i.ibb.co/k6fbd95/IMG-2265.jpg" class="card-img" onerror="this.src='https://via.placeholder.com/50'">
                <span>Scarlet Oilwel</span>
            </div>
            <a href="itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/davidum19/Scarlet-OTA/refs/heads/main/oilwel/manifest.plist" class="install-btn">INSTALL</a>
        </div>
    </div>

    <div id="esign-tab" class="content-section">
        <div class="card">
            <div class="card-info">
                <img src="https://i.ibb.co/yi27e18/IMG-2264.jpg" class="card-img" onerror="this.src='https://via.placeholder.com/50'">
                <span>ESign Forever</span>
            </div>
            <a href="itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/davidum19/Esign-OTA/refs/heads/main/forever/manifest.plist" class="install-btn">INSTALL</a>
        </div>
    </div>
</div>

<script>
    function showTab(tabId) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }
</script>
</body>
</html>
